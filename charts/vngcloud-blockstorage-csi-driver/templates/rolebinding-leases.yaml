kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "vngcloud-blockstorage-csi-driver.fullname" . }}-leases-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vngcloud-blockstorage-csi-driver.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "vngcloud-blockstorage-csi-driver.controllerServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "vngcloud-blockstorage-csi-driver.fullname" . }}-leases-role
  apiGroup: rbac.authorization.k8s.io
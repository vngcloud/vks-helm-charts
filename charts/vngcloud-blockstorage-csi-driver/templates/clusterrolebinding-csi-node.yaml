---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "vngcloud-blockstorage-csi-driver.fullname" . }}-node-binding
  labels:
    {{- include "vngcloud-blockstorage-csi-driver.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vngcloud-blockstorage-csi-driver.nodeServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "vngcloud-blockstorage-csi-driver.fullname" . }}-node-role
  apiGroup: rbac.authorization.k8s.io
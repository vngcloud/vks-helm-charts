{{- range .Values.storageClasses }}
{{- if .enabled }}
---
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: {{ .name }}
  {{- with .annotations }}
  annotations: {{- . | toYaml | trim | nindent 4 }}
  {{- end }}
  {{- with .labels }}
  labels: {{- . | toYaml | trim | nindent 4 }}
  {{- end }}
provisioner: bs.csi.vngcloud.vn
{{ omit . "name" "annotations" "labels" "enabled" | toYaml | indent 0 }}
{{- end }}
{{- end }}